name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,azure]"
      - name: Ruff
        run: ruff check .
      - name: Rubric is pre-registered (invariant #6)
        run: python -m strata_platform.eval.rubric --check
      - name: Pytest (no network, no DB)
        run: pytest -q
